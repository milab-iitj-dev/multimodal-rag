# ============================================================
# Training Configuration — Healthcare MRAG Phase 1
# ============================================================
# QLoRA fine-tuning hyperparameters for medical VQA.
# ============================================================

training:
  output_dir: "checkpoints/llava-medical-vqa"
  num_epochs: 3
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 4          # effective batch size = 2 * 4 = 8
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.03
  lr_scheduler_type: "cosine"
  logging_steps: 10
  save_steps: 200
  eval_steps: 200
  save_total_limit: 3
  fp16: true
  bf16: false                             # set true if GPU supports bf16
  gradient_checkpointing: true
  dataloader_num_workers: 2
  remove_unused_columns: false
  report_to: "none"                       # "wandb", "tensorboard", "none"
  seed: 42

  # Early stopping
  early_stopping:
    enabled: true
    patience: 3
    metric: "eval_loss"
