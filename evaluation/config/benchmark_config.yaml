# ============================================================
# Benchmark Configuration — Healthcare MRAG
# ============================================================

retrieval:
  dataset: "openi"
  split: "test"
  seed: 42
  top_k: [1, 3, 5]
  query_modes: ["text_only", "image_only", "hybrid"]

grounding:
  dataset: "openi"
  split: "test"
  max_samples: 100
  query_types:
    - "binary_clinical"
    - "descriptive_image"
    - "text_only"
    - "mixed_image_text"

generation:
  dataset: "vqa_rad"
  split: "test"
  metrics:
    - "exact_match"
    - "f1"
    - "bleu"
    - "rouge_l"
    - "bertscore"

output:
  base_dir: "outputs/benchmarks"
  save_per_sample: true
  generate_report: true
